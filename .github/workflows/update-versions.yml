name: Update Helm Chart Versions (nginx)

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-versions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Run version update script (Nginx mode)
        shell: pwsh
        run: ./update-versions.ps1 -Mode Nginx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push branch and open PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="auto-update/nginx-versions"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add -A
          git commit -m "chore: auto-update nginx Helm chart versions"
          git push origin "$BRANCH" --force

          # Create PR if it doesn't already exist
          gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' | grep -q . \
            || gh pr create \
                --base main \
                --head "$BRANCH" \
                --title "chore: auto-update nginx Helm chart versions" \
                --body "Automated version bump for anna-nginx and hesselinkme-nginx Helm charts.

Triggered by scheduled workflow. Review the diff and merge when ready."
