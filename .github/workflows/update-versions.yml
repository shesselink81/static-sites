name: Update Helm Chart Versions (nginx)

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-versions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Run version update script (Nginx mode)
        shell: pwsh
        run: ./update-versions.ps1 -Mode Nginx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Get new chart version
        id: version
        run: |
          TAG=$(grep '^appVersion:' charts/anna-nginx/Chart.yaml | sed 's/appVersion: *//;s/"//g;s/ *#.*//')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Commit and push to main
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: auto-update nginx Helm charts to ${{ steps.version.outputs.tag }}"
          git push origin main

      - name: Create GitHub Release
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          NOTES=$(printf 'Auto-updated anna-nginx and hesselinkme-nginx Helm charts.\n\nNew image version: %s' "$TAG")
          gh release create "$TAG" \
            --title "nginx charts $TAG" \
            --notes "$NOTES" \
            --latest
